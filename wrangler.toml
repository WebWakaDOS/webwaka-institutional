name = "webwaka-institutional"
main = "src/worker.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

# ─── Staging Environment ──────────────────────────────────────────────────────
[env.staging]
name = "webwaka-institutional-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "modules_prod"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "b49914b37199400a954654ef68453a73"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "655cfec5e7b34508b0971950263e0334"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-institutional-docs-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

# ─── Production Environment ───────────────────────────────────────────────────
[env.production]
name = "webwaka-institutional-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-institutional-db-production"
database_id = "ee93377c-8000-45d6-ae54-f0d4c588bf04"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "389ee9913714494f91ce2db0eb4d8e05"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "2dc25403cd2a4f4eb3bc5eeba636e7cc"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-institutional-docs-prod"

[env.production.vars]
ENVIRONMENT = "production"

# ─── Secrets (set via: wrangler secret put <KEY> --env <staging|production>) ──
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# OPENROUTER_API_KEY
# TERMII_API_KEY
# JAMB_API_KEY   — Institutional partner key for JAMB result verification API
# WAEC_API_KEY   — Institutional partner key for WAEC result verification API
